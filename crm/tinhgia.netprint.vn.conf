server {
    listen 80;
    listen [::]:80;
    server_name tinhgia.netprint.vn www.tinhgia.netprint.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tinhgia.netprint.vn www.tinhgia.netprint.vn;

    ssl_certificate /etc/letsencrypt/live/tinhgia.netprint.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tinhgia.netprint.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/tinhgia_access.log;
    error_log /var/log/nginx/tinhgia_error.log;

    root /var/www/netprint;
    index index.html;
    client_max_body_size 10M;

    # API proxy -> backend Python port 8510
    location /api/ {
        proxy_pass http://127.0.0.1:8510;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
