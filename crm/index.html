<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ED1C24" />
  <meta name="description" content="NetPrint CRM - Hệ thống quản lý in ấn chuyên nghiệp. In Màu · In Cảm Xúc" />

  <link rel="icon" type="image/png" href="/logo/logo-icon.png" />
  <link rel="apple-touch-icon" href="/logo/logo-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>NetPrint CRM</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- PWA Service Worker - CHỈ bật ở production -->
  <script>
    if ('serviceWorker' in navigator) {
      const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      if (isDev) {
        // DEV: Xóa sạch Service Worker cũ + cache cũ để tránh lỗi file cũ
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((reg) => {
            reg.unregister();
            console.log('[PWA] 🗑️ Đã gỡ Service Worker (dev mode)');
          });
        });
        caches.keys().then((keys) => {
          keys.forEach((key) => caches.delete(key));
          if (keys.length > 0) console.log('[PWA] 🗑️ Đã xóa cache cũ (dev mode)');
        });
      } else {
        // PRODUCTION: Đăng ký Service Worker bình thường
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] ✅ Service Worker registered:', reg.scope);
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'activated') {
                    console.log('[PWA] 🔄 New version available!');
                  }
                });
              });
            })
            .catch((err) => {
              console.log('[PWA] ❌ SW registration failed:', err);
            });
        });
      }
    }
  </script>
</body>

</html>
