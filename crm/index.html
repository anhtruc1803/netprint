<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ED1C24" />
  <meta name="description" content="NetPrint CRM - Hệ thống quản lý in ấn chuyên nghiệp. In Màu · In Cảm Xúc" />

  <link rel="icon" type="image/png" href="/logo/logo-icon.png" />
  <link rel="apple-touch-icon" href="/logo/logo-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>NetPrint CRM</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('[PWA] ✅ Service Worker registered:', reg.scope);

            // Kiểm tra update
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') {
                  console.log('[PWA] 🔄 New version available!');
                }
              });
            });
          })
          .catch((err) => {
            console.log('[PWA] ❌ SW registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
